{% extends 'index.html' %}

{% block content %}
<hr>
<div class="animated-bg"></div> <!-- Background Animation Container -->

<div class="container py-4 position-relative">
    <div class="row">
        {% for e in b %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
            <div class="card shadow-lg border-0 rounded-4 h-100 custom-card floating">
                <img src="{{ e.image_url }}" class="card-img-top rounded-top" alt="{{ e.ssnacks }}" 
                     style="object-fit: cover; height: 200px;">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="card-title fw-bold text-dark">{{ e.ssnacks|slice:":25" }}</h5>
                    <p class="card-text text-success fs-5">₹ {{ e.price|floatformat:2 }}</p>

                    {% if e.book_available is True %}
                    <span class="badge bg-success p-2 rounded-pill">✅ Available</span>
                    {% else %}
                    <span class="badge bg-danger p-2 rounded-pill">❌ Out of Stock</span>
                    {% endif %}

                    <div class="mt-auto">
                        <div class="d-grid gap-2 mt-3">
                            <a href="/card/{{e.id}}" class="btn btn-outline-primary fw-bold custom-btn">🛒 Add to Cart</a>
                            <a href="/details/{{e.id}}" class="btn btn-primary fw-bold custom-btn">💳 Buy Now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    /* Background Animation - Waves */
    .animated-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(0,0,0,0.1) 10%, transparent 80%);
        overflow: hidden;
        z-index: -1;
    }

    /* Animated Floating Dots */
    .animated-bg::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: url('https://www.transparenttextures.com/patterns/dots-grid.png');
        opacity: 0.15;
        animation: moveDots 20s linear infinite;
    }

    @keyframes moveDots {
        from { transform: translate(0, 0); }
        to { transform: translate(-50px, -50px); }
    }

    /* Floating Effect for Cards */
    .floating {
        animation: floatingEffect 3s ease-in-out infinite;
    }

    @keyframes floatingEffect {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
    }

    /* Custom Card Design */
    .custom-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        transition: all 0.3s ease-in-out;
        overflow: hidden;
        border-radius: 15px;
    }

    /* Card Hover Effect */
    .custom-card:hover {
        transform: translateY(-8px);
        box-shadow: 0px 12px 25px rgba(0, 0, 0, 0.15);
    }

    /* Buttons with Hover Glow */
    .custom-btn {
        transition: all 0.3s ease-in-out;
        border-radius: 50px;
    }

    .custom-btn:hover {
        box-shadow: 0px 5px 15px rgba(0, 123, 255, 0.4);
        transform: scale(1.05);
    }

    /* Badge Styling */
    .badge {
        font-size: 0.9rem;
        padding: 8px 15px;
    }

    /* Custom Font Styles */
    .card-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
    }

    .card-text {
        font-size: 1.1rem;
        font-weight: bold;
    }
</style>

{% endblock content %}
