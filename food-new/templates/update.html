<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Update User</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #343a40;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-top: 10px;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Update User Details</h2>
    <form method="POST">
        {% csrf_token %}
        
        <label>User Name:</label>
        <input type="text" name="sName" value="{{ s.sName }}" required>

        <label>Email ID:</label>
        <input type="text" name="eEmail" value="{{ s.eEmail }}" required>

        <label>Phone No.:</label>
        <input type="text" name="sphone" value="{{ s.sphone }}" required>

        <label>Address:</label>
        <input type="text" name="sAddress" value="{{ s.sAddress }}" required>

        <label>Post Code:</label>
        <input type="text" name="sCode" value="{{ s.sCode }}" required>

        <input type="submit" value="Update Record">
    </form>
</div>

</body>
</html>
