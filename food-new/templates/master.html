{% load static %}

<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>SNACKS SHOP</title>

  <style>
    /* Fade-in animation */
    .fade-in {
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Navbar glow effect */
    .navbar-brand {
      font-size: 1.5rem;
      font-weight: bold;
      text-transform: uppercase;
      transition: text-shadow 0.3s ease-in-out;
    }

    .navbar-brand:hover {
      text-shadow: 0px 0px 8px rgba(255, 193, 7, 0.8);
    }

    /* Navbar link hover animation */
    .nav-link {
      position: relative;
      transition: color 0.3s ease-in-out;
    }

    .nav-link:hover {
      color: #ffc107 !important;
      transform: translateY(-2px);
    }

    /* Dropdown menu bounce effect */
    .dropdown-menu {
      animation: bounceIn 0.5s ease-in-out;
    }

    @keyframes bounceIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Search bar pulsing effect */
    .search input {
      border-radius: 20px;
      transition: box-shadow 0.3s ease-in-out;
    }

    .search input:focus {
      box-shadow: 0px 0px 12px rgba(255, 193, 7, 0.7);
      transform: scale(1.02);
    }

    /* Button hover effects */
    .custom-btn {
      transition: all 0.3s ease-in-out;
    }

    .custom-btn:hover {
      transform: scale(1.05);
      box-shadow: 0px 5px 15px rgba(255, 193, 7, 0.4);
    }

    /* Slide-in effect for navbar */
    .navbar {
      animation: slideIn 0.8s ease-in-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Sticky Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
    }
  </style>
</head>

<body class="fade-in">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand glow-text" href="/">Snacks Shop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="">Home</a></li>
          
        <!-- Login/Signup Dropdown -->
        <div class="btn-group">
          <a class="nav-link dropdown-toggle text-white" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Login/Signup
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            {% if user.is_authenticated %}
              <li><a class="dropdown-item" href="/logout">Log Out</a></li>
            {% else %}
              <li><a class="dropdown-item" href="/accounts/login">Log In</a></li>
              <li><a class="dropdown-item" href="/signup">Sign Up</a></li>
            {% endif %}
          </ul>
        </div>

        <!-- Search Bar -->
       <form class="search ms-3" method="get" action="{% url 'search_snacks' %}">
    
</form>


      </div>
    </div>
  </nav>

  <br>

  <div class="container">
    {% block content %}
    {% endblock content %}
  </div>

  <!-- Bootstrap Script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
