<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
            text-align: center;
        }

        /* Admin Panel Header */
        h1 {
            background: linear-gradient(90deg, #ff8c00, #ff3b3b);
            padding: 20px;
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            border-radius: 0 0 10px 10px;
            box-shadow: 0px 5px 10px rgba(255, 136, 0, 0.5);
        }

        /* Table Styles */
        table {
            width: 90%;
            margin: 30px auto;
            border-collapse: collapse;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }

        th, td {
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        th {
            background-color: #333;
            color: #ffa500;
            text-transform: uppercase;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transition: 0.3s ease-in-out;
        }

        /* Action Buttons */
        .action-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s ease-in-out;
        }

        .update-btn {
            background: #28a745;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.4);
        }

        .update-btn:hover {
            background: #218838;
            transform: scale(1.1);
        }

        .delete-btn {
            background: #dc3545;
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.4);
        }

        .delete-btn:hover {
            background: #c82333;
            transform: scale(1.1);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            table {
                width: 100%;
                font-size: 14px;
            }

            .action-btn {
                font-size: 12px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <h1>Admin Panel - Manage Snacks</h1>

    <table>
       <thead>
           <tr>
               <th>Snack Name</th>
               <th>Veg/Non-Veg</th>
               <th>Description</th>
               <th>Price</th>
               <th>Actions</th>
           </tr>
       </thead>
       <tbody>
           {% for i in data1 %}
           <tr>
               <td>{{ i.ssnacks }}</td>
               <td>{{ i.veg_or_nonveg }}</td>
               <td>{{ i.description }}</td>
               <td>₹{{ i.price }}</td>
               <td>
                   <a href="/update2/{{ i.id }}" class="action-btn update-btn">Update</a>
                   <a href="/delete1/{{ i.id }}" class="action-btn delete-btn">Delete</a>
               </td>
           </tr>
           {% endfor %}
       </tbody>
   </table>
</body>
</html>
