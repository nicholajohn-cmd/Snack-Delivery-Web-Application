<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 20px;
            padding: 0;
            text-align: center;
        }

        h1 {
            color: #343a40;
            margin-bottom: 20px;
        }

        table {
            width: 90%;
            margin: 0 auto;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #343a40;
            color: white;
            text-transform: uppercase;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            color: white;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }

        .update-btn {
            background-color: #28a745;
        }

        .update-btn:hover {
            background-color: #218838;
        }

        .delete-btn {
            background-color: #dc3545;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        @media (max-width: 600px) {
            table {
                width: 100%;
            }

            th, td {
                font-size: 14px;
                padding: 8px;
            }

            .action-btn {
                font-size: 12px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>

    <h1>Admin Panel - Manage Users</h1>

    <table>
       <thead>
           <tr>
               <th>Name</th>
               <th>Email</th>
               <th>Phone No.</th>
               <th>Address</th>
               <th>Post Code</th>
               <th>Actions</th>
           </tr>
       </thead>
       <tbody>
           {% for i in data %}
           <tr>
               <td>{{ i.sName }}</td>
               <td>{{ i.eEmail }}</td>
               <td>{{ i.sphone }}</td>
               <td>{{ i.sAddress }}</td>
               <td>{{ i.sCode }}</td>
               <td>
                   <a href="/update/{{ i.id }}" class="action-btn update-btn">Update</a>
                   <a href="/delete/{{ i.id }}" class="action-btn delete-btn">Delete</a>
               </td>
           </tr>
           {% endfor %}
       </tbody>
   </table>

</body>
</html>
