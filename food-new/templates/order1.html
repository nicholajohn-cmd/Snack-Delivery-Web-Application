{% extends "index.html" %}
{% block content %}

<div class="container mt-5">
    <h2>Your Orders</h2>
    <hr>
    {% if orders %}
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Snack</th>
                    <th>Price</th>
                    <th>Ordered On</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                    <tr>
                        <td>{{ order.snacks.ssnacks }}</td>
                        <td>₹{{ order.snacks.price }}</td>
                        <td>{{ order.created }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p class="text-muted">You haven't placed any orders yet.</p>
    {% endif %}
</div>

{% endblock %}
