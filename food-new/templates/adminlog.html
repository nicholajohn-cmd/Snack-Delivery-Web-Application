<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login Form</title>

	<!-- Add Google Fonts for a modern look -->
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

	<!-- Internal CSS for styles and animations -->
	<style>
		/* Basic reset */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Poppins', sans-serif;
			background-color: #f0f4f8;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			overflow: hidden;
		}

		/* Center the form container */
		.center-container {
			background-color: white;
			border-radius: 8px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
			padding: 30px;
			width: 100%;
			max-width: 400px;
			animation: slideUp 0.5s ease-out;
		}

		/* Title text */
		h2 {
			text-align: center;
			margin-bottom: 20px;
			color: #333;
			animation: fadeIn 1s ease-out;
		}

		/* Input field styles */
		input[type="text"], input[type="password"] {
			width: 100%;
			padding: 12px;
			margin: 8px 0;
			border: 2px solid #ddd;
			border-radius: 4px;
			font-size: 16px;
			transition: border-color 0.3s;
		}

		/* Input focus effect */
		input[type="text"]:focus, input[type="password"]:focus {
			border-color: #007bff;
			box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
		}

		/* Submit button styles */
		input[type="submit"] {
			width: 100%;
			padding: 12px;
			background-color: #007bff;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-size: 16px;
			transition: background-color 0.3s, transform 0.2s;
		}

		/* Button hover effect */
		input[type="submit"]:hover {
			background-color: #0056b3;
			transform: scale(1.05);
		}

		/* Animation for fading in the form */
		@keyframes fadeIn {
			0% { opacity: 0; }
			100% { opacity: 1; }
		}

		/* Animation for sliding up the form */
		@keyframes slideUp {
			0% { transform: translateY(50px); opacity: 0; }
			100% { transform: translateY(0); opacity: 1; }
		}
	</style>
</head>
<body>

	<!-- Centered form container -->
	<div class="center-container">
		<h2>Login</h2>
		<form action="/name">
			<p>Name: <input type="text" name="name" placeholder="Enter name" required></p><br>
			<p>Password: <input type="password" name="password" placeholder="Password" required></p><br>

			<input type="submit" value="Submit Name">
		</form>
	</div>

</body>
</html>
