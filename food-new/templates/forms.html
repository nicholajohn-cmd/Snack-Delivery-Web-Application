{% extends 'index.html' %}

{% block content %}

<!DOCTYPE html>
<html>

<head>
    <title>Form Submission</title>
    <meta id="meta" name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f7fc;
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.15);
            background: white;
            padding: 25px;
        }

        .card h3 {
            font-weight: 600;
            color: #333;
        }

        .btn-custom {
            background-color: #007bff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s ease-in-out;
        }

        .btn-custom:hover {
            background-color: #0056b3;
        }

        .input-field {
            border: 2px solid #d1d9e6;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s ease-in-out;
            background: #f9fbff;
        }

        .input-field:focus {
            border-color: #007bff;
            box-shadow: 0px 0px 8px rgba(0, 123, 255, 0.3);
            outline: none;
        }

        .form-group, .form-row {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #444;
        }

        /* Image Styling */
        .image-container {
            text-align: center;
            margin: 20px 0;
        }

        .snack-image {
            display: block;
            max-width: 230px;
            border-radius: 12px;
            border: 3px solid #e1e6f0;
            background-color: white;
            padding: 8px;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease-in-out;
        }

        .snack-image:hover {
            transform: scale(1.05);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .card {
                padding: 15px;
            }
            .snack-image {
                max-width: 180px;
            }
            .btn-custom {
                font-size: 16px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <h3 class="text-primary text-center">Complete Your Payment</h3>
                    <hr>

                    <!-- Image Section -->
                    <h5 class="text-dark text-center">Snack Image</h5>
                    <div class="image-container">
                        <img src="{{ c.image_url }}" alt="Snack Image" class="snack-image">
                    </div>

                    <!-- Form -->
                    <form class="mt-3" action="/store1">
                        {% csrf_token %}

                        <!-- Snack Name -->
                        <h5 class="text-dark">Snack Name</h5>
                        <div class="form-group">
                            <input type="text" name="s_snacks1" placeholder="Enter snack name" value="{{ c.ssnacks }}" class="input-field" required>
                        </div>

                        <!-- Price -->
                        <h5 class="text-dark">Price</h5>
                        <div class="form-group">
                            <input type="text" name="s_price1" placeholder="Enter price" value="{{ c.price }}" class="input-field" required>
                        </div>

                        <hr>
                        <!-- Card Details -->
                        <h5 class="text-dark">Card Details</h5>
                        <div class="form-group">
                            <label>Card Number</label>
                            <input type="text" name="ccardno1" placeholder="Enter your card number" class="input-field" required>
                        </div>

                        <div class="form-row">
                            <div class="col">
                                <label>Expiry Date</label>
                                <input type="text" name="Expires" placeholder="MM/YY" class="input-field" required>
                            </div>
                            <div class="col">
                                <label>CSC</label>
                                <input type="text" name="CSC" placeholder="3-digit code" class="input-field" required>
                            </div>
                        </div>

                        <hr>
                        <h5 class="text-dark mt-3">Billing Address</h5>

                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="F_name" placeholder="John" class="input-field" required>
                        </div>

                        <div class="form-group">
                            <label>Street Address</label>
                            <input type="text" name="Address1" placeholder="123 Main Street" class="input-field" required>
                        </div>

                        <div class="form-row">
                            <div class="col">
                                <label>City</label>
                                <input type="text" name="City" placeholder="New York" class="input-field" required>
                            </div>
                            <div class="col">
                                <label>State</label>
                                <input type="text" name="State1" placeholder="NY" class="input-field" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="col">
                                <label>Postal Code</label>
                                <input type="text" name="Post_code" placeholder="10001" class="input-field" required>
                            </div>
                            <div class="col">
                                <label>Mobile No.</label>
                                <input type="text" name="Mobile_no" placeholder="+1 234 567 8901" class="input-field" required>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-custom btn-block mt-4">Pay Now</button>
                    </form>

                    {% if success %}
                    <p class="text-success mt-3 text-center">Data saved successfully!</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>

</html>

{% endblock content %}
